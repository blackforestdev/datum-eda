name: Alignment

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  alignment:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Authoritative gate set — single source of truth. Runs the full drift
      # gates: governance coverage/classification, spec parity, contract
      # write-fences (private-writer bans, daemon write parity), MCP public
      # taxonomy, GUI token/icon/terminal gates, progress coverage, and all
      # PG-* proof gates.
      - name: Full drift gates (scripts/run_drift_gates.sh)
        env:
          # PRs compare against the protected base; pushes compare against the
          # prior branch tip. The checker fails closed if this revision is absent.
          SOURCE_HEALTH_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: bash scripts/run_drift_gates.sh

      - name: Workspace health audit
        run: python3 scripts/check_alignment.py --run-health

      - name: M3 preflight audit
        run: python3 scripts/check_alignment.py --run-m3-preflight

      - name: Route strategy evidence baseline gate
        run: python3 scripts/check_route_strategy_evidence.py

      - name: Native fixture validation gate
        run: python3 scripts/check_native_project_fixtures.py

      - name: Imported query determinism gate
        run: python3 scripts/check_import_query_determinism.py

  transport-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Daemon socket transport smoke
        run: cargo test -q -p eda-engine-daemon handle_client_round_trips_open_project_and_get_check_report -- --ignored
