name: Alignment

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  alignment:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: MCP test file size guardrail
        run: python3 scripts/check_test_file_sizes.py --max-lines 700

      - name: Source file size budget guardrail
        run: python3 scripts/check_file_size_budgets.py

      - name: Decomposition coverage guardrail
        run: python3 scripts/check_decomposition_coverage.py

      - name: Touched monolith burn-down guardrail
        run: python3 scripts/check_touched_monolith_growth.py

      - name: MCP server self-test
        run: python3 mcp-server/server.py --self-test

      - name: Static alignment audit
        run: python3 scripts/check_alignment.py

      - name: Progress coverage audit
        run: python3 scripts/check_progress_coverage.py

      - name: Milestone gate audit
        run: python3 scripts/check_alignment.py --run-gates

      - name: Workspace health audit
        run: python3 scripts/check_alignment.py --run-health

      - name: M3 preflight audit
        run: python3 scripts/check_alignment.py --run-m3-preflight

      - name: Route strategy evidence baseline gate
        run: python3 scripts/check_route_strategy_evidence.py

      - name: Native fixture validation gate
        run: python3 scripts/check_native_project_fixtures.py

      - name: Imported query determinism gate
        run: python3 scripts/check_import_query_determinism.py

  transport-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Daemon socket transport smoke
        run: cargo test -q -p eda-engine-daemon handle_client_round_trips_open_project_and_get_check_report -- --ignored
