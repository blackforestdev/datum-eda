# Fixture purpose:
#   Verifies dense native board text, manufacturing defaults, tiny text, and
#   mixed family/intent behavior.

[fixture]
name = "text-density-repro"
lane = "A"
suite = "board-text"
fixture_format_version = 1

[input]
project_path = "crates/engine/testdata/golden/text/native/text-density-repro"
project_kind = "datum-native"

[viewport]
width_px = 1024
height_px = 768
center_mm = [105.0, 75.0]
zoom_mm_per_px = 0.16
ui_scale_factors = [1.0, 1.25, 1.5, 2.0]

[golden]
filename = "text-density-repro.golden.png"
diff_policy = "exact"
diff_tolerance_per_pixel = 0
diff_tolerance_total_px_pct = 0.0
ssim_threshold = 0.0
mask_filename = ""

[blank_check]
expect_non_blank_pct = 1.0
